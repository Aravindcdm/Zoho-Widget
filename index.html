<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <title>Bike Product Selector</title>

    <script src="https://live.zwidgets.com/js-sdk/1.0/ZohoEmbededAppSDK.min.js"></script>

    <style>

        body
        {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h2
        {
            margin-bottom: 20px;
        }

        select,
        input,
        button
        {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        button
        {
            cursor: pointer;
        }

        .success
        {
            color: green;
            margin-top: 10px;
        }

        .error
        {
            color: red;
            margin-top: 10px;
        }

    </style>

</head>

<body>

    <h2>Select Bike Product</h2>

    <label>Bike</label>

    <select id="bikeSelect">
        <option>Loading products...</option>
    </select>

    <label>Quantity</label>

    <input
        type="number"
        id="quantity"
        value="1"
        min="1"
    >

    <button onclick="addProduct()">
        Add Product
    </button>

    <div id="message"></div>

<script>

let dealId = "";

ZOHO.embeddedApp.on("PageLoad", function(data)
{
    console.log(data);

    dealId = data.EntityId[0];

    loadProducts();
});

ZOHO.embeddedApp.init();


// LOAD PRODUCTS
function loadProducts()
{
    ZOHO.CRM.API.getAllRecords({
        Entity: "Products"
    })

    .then(function(response)
    {
        console.log(response);

        let products = response.data;

        let dropdown =
            document.getElementById("bikeSelect");

        dropdown.innerHTML = "";

        if(!products || products.length == 0)
        {
            dropdown.innerHTML =
                "<option>No Products Found</option>";

            return;
        }

        products.forEach(function(product)
        {
            let category =
                product.Product_Category || "";

            // SHOW ONLY BIKE TYPES
            if(
                category == "Sports Bike" ||
                category == "Adventure Bike" ||
                category == "Electric Bike" ||
                category == "Cruiser" ||
                category == "Scooter"
            )
            {
                let option =
                    document.createElement("option");

                option.value = product.id;

                option.text =
                    product.Product_Name +
                    " (" +
                    category +
                    ") - ₹" +
                    product.Unit_Price;

                dropdown.appendChild(option);
            }
        });
    })

    .catch(function(error)
    {
        console.log(error);

        alert(JSON.stringify(error));
    });
}



// ADD PRODUCT TO DEAL SUBFORM
function addProduct()
{
    let productId =
        document.getElementById("bikeSelect").value;

    let quantity =
        parseInt(
            document.getElementById("quantity").value
        );

    let message =
        document.getElementById("message");

    message.innerHTML = "";

    if(productId == "")
    {
        message.innerHTML =
            '<div class="error">Please select a product.</div>';

        return;
    }

    if(quantity <= 0)
    {
        message.innerHTML =
            '<div class="error">Quantity must be greater than 0.</div>';

        return;
    }


    // GET CURRENT DEAL RECORD
    ZOHO.CRM.API.getRecord({
        Entity: "Deals",
        RecordID: dealId
    })

    .then(function(recordResponse)
    {
        console.log(recordResponse);

        let existingRows = [];

        if(
            recordResponse.data[0].Interested != null
        )
        {
            existingRows =
                recordResponse.data[0].Interested;
        }


        // ADD NEW ROW
        existingRows.push({

            Product:
            {
                id: productId
            },

            Quantity_Ordered: quantity

        });


        // UPDATE DEAL
        ZOHO.CRM.API.updateRecord({

            Entity: "Deals",

            APIData:
            {
                id: dealId,

                Interested: existingRows
            }

        })

        .then(function(updateResponse)
        {
            console.log(updateResponse);

            message.innerHTML =
                '<div class="success">Product added successfully.</div>';
        })

        .catch(function(error)
        {
            console.log(error);

            message.innerHTML =
                '<div class="error">Failed to update deal.</div>';
        });

    })

    .catch(function(error)
    {
        console.log(error);

        message.innerHTML =
            '<div class="error">Failed to fetch deal.</div>';
    });

}

</script>

</body>

</html>
